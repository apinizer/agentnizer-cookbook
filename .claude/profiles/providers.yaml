# .claude/profiles/providers.yaml
# Example external-service adapter module (e.g. LLM providers, cloud APIs).
# Replace command bodies with whatever your stack uses.

module: providers
type: provider_layer
default_risk_level: HIGH

paths:
  - "apps/providers/**"

build:
  command: "<your build command for the providers module>"
  cwd: "apps/providers"

test:
  command: "<your test command for the providers module>"

lint:
  command: "<your lint command for the providers module>"

manifest_check:
  performance:
    - "Streaming enabled by default where the upstream supports it?"
    - "Per-provider connection pool with reasonable limits?"
    - "Caching headers honoured where applicable?"
  thread_safety:
    - "Provider adapter stateless (no module-level mutable state)?"
    - "Rate-limit counters use proper locking?"
    - "Credentials accessed per-request, not cached globally?"
  safety:
    - "Credentials scoped per-tenant (no cross-tenant key sharing)?"
    - "Cost guard / hard limit enforced (so a misbehaving call can't bankrupt the tenant)?"
    - "Fallback chain tested: primary down → secondary → local fallback?"
  observability:
    - "Every outbound call logged: provider, model/endpoint, tenant_id, cost, latency?"
    - "Cost-tracking event emitted per call?"
    - "Fallback events logged with reason?"

depends_on:
  - shared

notes: |
  External-service-adapter example. Each adapter implements the project's
  provider contract independently. Cost guard and per-tenant credential
  scoping are non-negotiable; the fallback chain should be tested as part
  of regular regression.
